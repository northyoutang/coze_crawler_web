<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扣子技能爬取管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-gradient-to-r from-indigo-600 to-purple-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-white mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                    </svg>
                    <h1 class="text-xl font-bold text-white">扣子技能爬取管理系统</h1>
                </div>
                <div class="flex items-center">
                    <button onclick="logout()" class="text-white hover:bg-white/20 px-4 py-2 rounded-lg transition-colors">
                        <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                        退出登录
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- 左侧菜单 -->
        <div class="w-64 mr-6">
            <nav class="bg-white rounded-xl shadow-md p-4 space-y-2">
                <button onclick="showSection('keywords')" class="menu-btn w-full text-left px-4 py-3 rounded-lg font-medium transition-colors bg-indigo-50 text-indigo-600" data-section="keywords">
                    <svg class="w-5 h-5 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                    </svg>
                    主题词管理
                </button>
                <button onclick="showSection('files')" class="menu-btn w-full text-left px-4 py-3 rounded-lg font-medium transition-colors hover:bg-gray-100 text-gray-700" data-section="files">
                    <svg class="w-5 h-5 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                    文件浏览
                </button>
                <button onclick="showSection('scheduler')" class="menu-btn w-full text-left px-4 py-3 rounded-lg font-medium transition-colors hover:bg-gray-100 text-gray-700" data-section="scheduler">
                    <svg class="w-5 h-5 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    定时设置
                </button>
                <button onclick="showSection('crawl')" class="menu-btn w-full text-left px-4 py-3 rounded-lg font-medium transition-colors hover:bg-gray-100 text-gray-700" data-section="crawl">
                    <svg class="w-5 h-5 inline mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582m15.356 2A8.001 8.001 0 004.582m0 0a8.001 8.001 0 0015.356 2A8.001 8.001 0 004.582 0"></path>
                    </svg>
                    手动爬取
                </button>
            </nav>

            <!-- 系统状态卡片 -->
            <div class="mt-6 bg-white rounded-xl shadow-md p-4">
                <h3 class="font-semibold text-gray-800 mb-3">系统状态</h3>
                <div id="statusInfo" class="space-y-2 text-sm">
                    <!-- 动态加载中 -->
                </div>
            </div>
        </div>

        <!-- 右侧内容区 -->
        <div class="flex-1">
            <!-- 主题词管理 -->
            <section id="keywords-section" class="section-content bg-white rounded-xl shadow-md p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">主题词管理</h2>
                    <button onclick="showAddKeywordModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                        <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        添加主题词
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">ID</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">主题词</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">创建时间</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600">操作</th>
                            </tr>
                        </thead>
                        <tbody id="keywordsTable" class="divide-y divide-gray-200">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 文件浏览 -->
            <section id="files-section" class="section-content bg-white rounded-xl shadow-md p-6 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">文件浏览</h2>
                <div id="fileTree" class="border border-gray-200 rounded-lg p-4 min-h-[400px] max-h-[600px] overflow-y-auto">
                    <!-- 动态加载文件树 -->
                </div>
            </section>

            <!-- 定时设置 -->
            <section id="scheduler-section" class="section-content bg-white rounded-xl shadow-md p-6 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">定时设置</h2>
                <form id="schedulerForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">爬取间隔（小时）</label>
                            <input type="number" id="intervalHours" min="1" max="24" value="1"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">启用定时任务</label>
                            <div class="flex items-center mt-2">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="schedulerEnabled" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                                </label>
                                <span class="ml-3 text-gray-600" id="schedulerStatusText">已启用</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-lg">
                        <h4 class="font-semibold text-blue-800 mb-2">下次执行时间</h4>
                        <p id="nextRunTime" class="text-blue-600">加载中...</p>
                    </div>

                    <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                        <h4 class="font-semibold text-green-800 mb-2">🤖 浏览器自动化爬取</h4>
                        <p class="text-green-700 text-sm">
                            系统自动化爬取，浏览器会自动访问扣子技能商店并捕获 API 响应数据。
                        </p>
                    </div>

                    <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition-colors">
                        保存设置
                    </button>
                </form>
            </section>

            <!-- 手动爬取 -->
            <section id="crawl-section" class="section-content bg-white rounded-xl shadow-md p-6 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">手动爬取</h2>
                
                <div class="mb-6">
                    <div class="flex gap-4 mb-4">
                        <button onclick="startCrawl()" id="startCrawlBtn" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-colors flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            开始爬取
                        </button>
                        <select id="crawlKeyword" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="">全部关键词</option>
                        </select>
                    </div>

                    <!-- 进度条 -->
                    <div class="mb-4">
                        <div class="flex justify-between text-sm text-gray-600 mb-1">
                            <span id="crawlStatus">等待开始</span>
                            <span id="crawlKeywordName"></span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div id="progressBar" class="bg-green-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- 统计信息 -->
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-blue-50 p-4 rounded-lg text-center">
                            <div id="skillCount" class="text-2xl font-bold text-blue-600">0</div>
                            <div class="text-sm text-gray-600">获取技能数</div>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg text-center">
                            <div id="currentPage" class="text-2xl font-bold text-green-600">0</div>
                            <div class="text-sm text-gray-600">当前页码</div>
                        </div>
                        <div class="bg-purple-50 p-4 rounded-lg text-center">
                            <div id="crawlRunning" class="text-2xl font-bold text-purple-600">未运行</div>
                            <div class="text-sm text-gray-600">运行状态</div>
                        </div>
                    </div>
                </div>

                <!-- 日志输出 -->
                <div>
                    <h3 class="font-semibold text-gray-800 mb-3">爬取日志</h3>
                    <div id="crawlLogs" class="bg-gray-900 text-green-400 font-mono text-sm p-4 rounded-lg h-80 overflow-y-auto">
                        <div class="text-gray-500">等待爬取开始...</div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 添加/编辑主题词模态框 -->
    <div id="keywordModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-4">添加主题词</h3>
            <form id="keywordForm">
                <input type="hidden" id="editKeywordId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">主题词</label>
                    <input type="text" id="keywordInput" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
                        placeholder="请输入主题词">
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeKeywordModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        操作成功
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
